name: Hlídání termínů úkolů (AquaCtrl)

# Automatické hlídání (po termínu / připomenutí před termínem / nepotvrzeno)
# teď dělá Cloud Function aquaUkolyCheck (repo mojebudky, functions/index.js) –
# ta umí navíc i připomenutí před termínem. Tenhle workflow zůstává jen pro
# ruční spuštění, ať se upozornění neposílají dvakrát.
on:
  workflow_dispatch:

jobs:
  check-terminy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Nastav Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instaluj závislosti
        run: pip install firebase-admin

      - name: Ulož service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account-key.json

      - name: Zkontroluj termíny
        run: python check_terminy_aquactrl.py
