name: Naplnit povolené e-maily (AquaControl)

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Přidat jeden e-mail (nepovinné, prázdné = doplnit ze seznamu v seed_login_email.py)'
        required: false
        default: ''
      kod:
        description: 'Kód osoby z LIDE (jen pokud vyplňuješ email výše)'
        required: false
        default: ''

jobs:
  seed-login-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Nastav Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instaluj závislosti
        run: pip install firebase-admin

      - name: Ulož service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account-key.json

      - name: Naplň povolené e-maily
        run: |
          if [ -n "${{ github.event.inputs.email }}" ]; then
            python seed_login_email.py pridej "${{ github.event.inputs.email }}" "${{ github.event.inputs.kod }}"
          else
            python seed_login_email.py
          fi
