name: Diagnostika událostí (dočasné)

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Nastav Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instaluj závislosti
        run: pip install firebase-admin
      - name: Ulož service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account-key.json
      - name: Diagnostika
        run: python _diag_udalosti.py
